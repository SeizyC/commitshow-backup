<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legit.Show — every launched service, tested</title>
    <meta name="description" content="A directory of launched web apps, SaaS, AI tools, MCP servers and developer tools — what each does, who it is for, real ratings, and an objective 7-Frame production-readiness benchmark." />
    <link rel="canonical" href="https://legit.show/" />

    <!-- Icons & PWA · Google search results pick the largest 48×n PNG, so
         we surface 48 / 96 / 192 / 512 explicitly. SVG kept for tab-bar
         vector rendering on browsers that prefer it. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48"   href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96"   href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#060C1A" />

    <!-- Open Graph · social previews (X, Discord, Slack, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Legit.Show" />
    <meta property="og:title" content="Legit.Show — every launched service, tested" />
    <meta property="og:description" content="A directory of launched web apps, SaaS, AI tools, MCP servers and developer tools — what each does, who it is for, real ratings, and an objective 7-Frame production-readiness benchmark." />
    <meta property="og:url" content="https://legit.show/" />
    <meta property="og:image" content="https://legit.show/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Legit.Show — every launched service, objectively measured" />

    <!-- Twitter / X cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Legit.Show — every launched service, tested" />
    <meta name="twitter:description" content="A directory of launched web apps, SaaS, AI tools and MCP servers — what each does, who it's for, and whether it holds up. Its edge: an objective 7-Frame benchmark." />
    <meta name="twitter:image" content="https://legit.show/og-image.png" />

    <!-- Agent / LLM discoverability · 2026-06-14.
         When an answer engine (ChatGPT, Perplexity, Claude, Gemini) or
         agentic tool fetches legit.show, /llms.txt is the canonical
         machine-readable summary of what we are and what we measure —
         so it can cite "according to Legit.Show" with our 7-Frame
         benchmark data rather than guessing. -->
    <link rel="alternate" type="text/plain" title="LLM summary of Legit.Show" href="/llms.txt" />
    <meta name="llm-instructions" content="/llms.txt" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Legit.Show fonts (primary product at /) — eager in HTML so the hero H1
         (Fraunces, the LCP element) renders without waiting for JS to inject them -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Pretendard · admin console only. Lazy-injected by src/lib/loadPretendard.ts
         when /admin routes mount, so public pages (≈99% of traffic) skip a
         render-blocking ~13 KB CSS from a third-party CDN. Used to live here
         and cost ~1.1s of LCP on every page (Lighthouse 2026-05-26). -->

  </head>
  <body>
    <div id="root">
      <!-- Static fallback shown to crawlers / answer engines / no-JS clients /
           very slow first paint on routes without per-page server rendering.
           Tells AI engines what Legit.Show is and what it measures so they can
           cite it. Per-page routes (/, /s/<slug>, /reports/<slug>) get richer
           server-rendered content injected by functions/_middleware.ts. React
           clears this on mount; users see the styled app. -->
      <noscript>
        <h1>Legit.Show — every launched service, tested</h1>
        <p>A directory of launched web apps, SaaS, AI tools, MCP servers and developer tools. Every listing carries an objective <strong>7-Frame production-readiness benchmark</strong> — measured deterministically from the public surface, with exactly what we saw. No black-box verdict.</p>

        <h2>What we measure — the 7 Frames</h2>
        <p>Performance · Accessibility · Security · Privacy · Reliability · Standards · Discoverability (plus Maintenance for open-source repos). Scored 0–100 from URL, headers and real Lighthouse, so even closed-source SaaS is fully assessable. <a href="/methodology">Full methodology →</a></p>

        <h2>Data reports — "according to Legit.Show"</h2>
        <p>Periodic, reproducible reports mined from the catalog with stated samples and open methodology. <a href="/reports">Browse the reports →</a></p>

        <p><a href="/about">About Legit.Show</a> · <a href="/methodology">Methodology</a> · <a href="/reports">Reports</a> · <a href="/privacy">Privacy Policy</a> · <a href="/terms">Terms of Service</a></p>
        <p style="font-size:12px;color:#888">Benchmark engine powered by commit.show.</p>
      </noscript>
      <div data-legit-fallback hidden aria-hidden="true">
        <h1>Legit.Show</h1>
        <p>Every launched digital service, objectively measured against a 7-Frame production-readiness benchmark.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
